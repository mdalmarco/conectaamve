<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mapa de Atores do Ecossistema de Inovação de Indaial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      /* === Identidade Conecta AMVE === */
      --brand-primary:   #660090;
      --brand-secondary: #f87d73;
      --brand-turquoise: #46c9cc;
      --brand-lime:      #a2c43a;
      --brand-coral:     #f87d73;
      --brand-ink: #1a1a1a;
      --brand-muted: #6e6e7a;
      --surface-page: #fcfbfa;
      --surface-panel: rgba(255,255,255,0.62);
      --surface-soft: rgba(255,255,255,0.45);
      --surface-hover: rgba(255,255,255,0.75);
      --border: rgba(255,255,255,0.82);
      --border-strong: rgba(255,255,255,0.95);
      /* anéis do radar nas cores da identidade */
      --ring-a: rgba(162,196,58,0.12);
      --ring-b: rgba(70,201,204,0.15);
      --ring-c: rgba(248,125,115,0.15);
      --ring-d: rgba(102,0,144,0.15);
      --shadow-sm: 0 10px 30px rgba(26,26,26,0.06);
      --shadow-md: 0 20px 60px rgba(102,0,144,0.18), 0 8px 24px rgba(70,201,204,0.10);
      --shadow-node: 0 10px 24px rgba(102,0,144,0.18);
      /* glass */
      --glass-bg: linear-gradient(145deg, rgba(255,255,255,0.70) 0%, rgba(255,255,255,0.36) 100%);
      --glass-blur: blur(28px) saturate(1.5);
      --glass-border: 1px solid rgba(255,255,255,0.85);
      --glass-shine-top: linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.85) 50%, transparent 90%);
      --glass-shadow: 0 2px 0 rgba(255,255,255,0.9) inset, 0 -1px 0 rgba(255,255,255,0.25) inset;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 10px;
      --ease: cubic-bezier(.2,.8,.2,1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(120% 90% at 50% 0%, #ffffff 0%, var(--surface-page) 55%, #f2f0ec 100%);
      color: var(--brand-ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 388px;
      grid-template-rows: auto 1fr;
      gap: 18px;
      padding: 22px;
    }

    .topbar {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .brand-block {
      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-turquoise));
      box-shadow: 0 16px 36px rgba(102,0,144,0.28), 0 1px 0 rgba(255,255,255,0.25) inset;
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--brand-primary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    h1 {
      margin: 0;
      color: var(--brand-ink);
      font-size: clamp(25px, 3vw, 42px);
      line-height: 1.05;
      letter-spacing: -.03em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    .sync-status {
      min-width: 250px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      color: var(--brand-muted);
      font-size: 13px;
      text-align: right;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #16a34a;
      box-shadow: 0 0 0 6px rgba(22, 163, 74, .12);
      flex: 0 0 auto;
    }

    .main-stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(520px, 1fr);
      gap: 16px;
    }

    .toolbar,
    .stats-grid,
    .side-panel,
    .map-card {
      background: var(--glass-bg);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow), var(--shadow-md);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      position: relative;
      overflow: hidden;
    }
    /* brilho de refração no topo de cada card glass */
    .toolbar::before,
    .stats-grid::before,
    .side-panel::before,
    .map-card::before {
      content: "";
      position: absolute;
      inset-inline: 0;
      top: 0;
      height: 1px;
      background: var(--glass-shine-top);
      z-index: 1;
      pointer-events: none;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(200px, 1.4fr) repeat(3, minmax(110px, .65fr)) auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius-xl);
    }

    .field,
    .select-wrap {
      min-width: 0;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 14px;
      border: var(--glass-border);
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--brand-muted);
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
    }

    .field:focus-within,
    .select-wrap:focus-within {
      border-color: rgba(102,0,144,.4);
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 0 0 4px rgba(102,0,144,.10);
    }

    .field input,
    .select-wrap select {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--brand-ink);
      appearance: none;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap i:last-child {
      margin-left: auto;
      pointer-events: none;
    }

    .toolbar-actions {
      display: none;
    }

    .btn {
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: var(--glass-border);
      border-radius: 999px;
      padding: 0 16px;
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      color: var(--brand-ink);
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 2px 8px rgba(102,0,144,0.06);
      transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 1px 0 rgba(255,255,255,0.95) inset, 0 12px 28px rgba(102,0,144,0.12);
    }

    .btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--brand-primary), #9b34c8);
      color: #fff;
      box-shadow: 0 16px 30px rgba(102,0,144,0.28), 0 1px 0 rgba(255,255,255,0.25) inset;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #7a00aa, #b040e0);
      box-shadow: 0 20px 40px rgba(102,0,144,0.32), 0 1px 0 rgba(255,255,255,0.25) inset;
    }

    .btn-icon {
      width: 46px;
      padding: 0;
      flex: 0 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 1px;
      overflow: hidden;
      border-radius: var(--radius-xl);
    }

    .stat-card {
      min-height: 92px;
      padding: 18px;
      background: rgba(255,255,255,0.55);
      position: relative;
    }

    .stat-label {
      margin: 0 0 6px;
      color: var(--brand-muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-label .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-value {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -.03em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: var(--brand-primary);
    }
    .stat-card:first-child .stat-value {
      font-size: 32px;
      color: var(--brand-ink);
    }
    .stat-value.is-zero {
      color: var(--brand-coral);
      opacity: 0.75;
    }

    .map-card {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border-radius: 28px;
    }

    .map-header {
      position: absolute;
      inset: 18px 18px auto;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }
    .map-actions {
      position: absolute;
      bottom: 14px;
      right: 14px;
      z-index: 5;
      display: flex;
      gap: 6px;
    }
    .map-actions .btn {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 50%;
      opacity: 0.7;
      transition: opacity .2s;
    }
    .map-actions .btn:hover {
      opacity: 1;
    }

    .map-caption {
      pointer-events: auto;
    }
    .legend-help-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: var(--glass-border);
      border-radius: 999px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      color: var(--brand-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--glass-shadow);
      transition: background .2s;
    }
    .legend-help-btn:hover {
      background: rgba(255,255,255,0.82);
    }
    .radar-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 20;
      max-width: 300px;
      padding: 12px 14px;
      border: var(--glass-border);
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px);
      color: var(--brand-muted);
      font-size: 13px;
      line-height: 1.5;
      box-shadow: var(--shadow-md);
      pointer-events: auto;
      display: none;
    }
    .radar-popover.is-open {
      display: block;
    }
    .legend-area {
      padding: 10px 14px 4px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 550px;
      pointer-events: auto;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      border: var(--glass-border);
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--brand-ink);
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--glass-shadow);
    }

    .legend-swatch {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--swatch);
    }

    .radar-svg {
      width: 100%;
      height: 100%;
      min-height: 640px;
      display: block;
      touch-action: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.7), rgba(250,250,252,.62)),
        radial-gradient(circle at center, rgba(84,37,119,.05), transparent 58%);
    }

    .ring-fill {
      fill: none;
      stroke: var(--ring-a);
      stroke-width: 56;
    }

    .ring-fill:nth-of-type(2) { stroke: var(--ring-b); }
    .ring-fill:nth-of-type(3) { stroke: var(--ring-c); }
    .ring-fill:nth-of-type(4) { stroke: var(--ring-d); }
    .ring-fill:nth-of-type(5) { stroke: rgba(84, 37, 119, .18); }

    .ring-line,
    .segment-line {
      fill: none;
      stroke: rgba(84, 37, 119, .14);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .segment-label,
    .level-label {
      fill: var(--brand-muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .01em;
      pointer-events: none;
    }

    .level-label {
      font-size: 12px;
      fill: rgba(46,46,56,.72);
    }

    .center-node {
      filter: drop-shadow(0 16px 26px rgba(84,37,119,.22));
    }

    .center-node circle {
      fill: url(#centerGradient);
    }

    .center-node text {
      fill: #fff;
      font-weight: 800;
      text-anchor: middle;
    }

    .actor-node {
      outline: none;
    }

    .actor-node .node-hit {
      fill: transparent;
      cursor: pointer;
    }

    .actor-node .logo-box {
      fill: #fff;
      stroke: rgba(84,37,119,.16);
      stroke-width: 1;
      filter: drop-shadow(0 10px 14px rgba(46,46,56,.16));
      transition: transform .25s var(--ease), stroke .25s var(--ease), filter .25s var(--ease);
    }

    .actor-node .logo-initials {
      fill: var(--brand-primary);
      font-size: 13px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .actor-node .actor-image {
      clip-path: inset(0 round 10px);
      pointer-events: none;
    }

    .actor-node.is-muted {
      opacity: .18;
    }

    .actor-node.is-highlight .logo-box,
    .actor-node:hover .logo-box {
      stroke: var(--brand-coral);
      stroke-width: 2;
      filter: drop-shadow(0 14px 20px rgba(248,125,115,.28));
    }

    .actor-node.is-selected .logo-box {
      stroke: var(--brand-primary);
      stroke-width: 3;
      filter: drop-shadow(0 18px 24px rgba(102,0,144,.28));
    }

    .tooltip {
      position: fixed;
      z-index: 40;
      width: max-content;
      max-width: 260px;
      padding: 11px 12px;
      border: var(--glass-border);
      border-radius: 14px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow: var(--glass-shadow), var(--shadow-md);
      color: var(--brand-ink);
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .16s var(--ease), transform .16s var(--ease);
    }

    .tooltip.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .tooltip span {
      display: block;
      color: var(--brand-muted);
      line-height: 1.45;
    }

    .side-panel {
      position: sticky;
      top: 22px;
      align-self: start;
      max-height: calc(100vh - 44px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border-radius: 28px;
    }

    .panel-head {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    .panel-body {
      overflow: auto;
      padding: 22px;
    }

    .actor-profile {
      display: grid;
      gap: 20px;
    }

    .profile-logo {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(84,37,119,.10), rgba(229,39,104,.10)),
        #fff;
      box-shadow: var(--shadow-sm);
      color: var(--brand-primary);
      font-size: 22px;
      font-weight: 800;
    }

    .profile-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .profile-kicker {
      margin: 0 0 8px;
      color: var(--brand-primary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .11em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    .profile-name {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: -.03em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--brand-ink);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-list {
      display: grid;
      gap: 8px;
      margin-bottom: 4px;
    }
    .section-label {
      margin: 14px 0 6px;
      color: var(--brand-muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    .detail {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #fbfbfd;
      border: 1px solid #efeff6;
    }

    .detail i {
      color: var(--brand-primary);
    }

    .detail-label {
      margin: 0 0 3px;
      color: var(--brand-muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .detail-value {
      margin: 0;
      color: var(--brand-ink);
      font-size: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .detail-value a {
      color: var(--brand-primary);
      font-weight: 600;
      text-decoration: none;
    }
    .detail-value a:hover {
      text-decoration: underline;
    }

    .empty-state {
      min-height: 520px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--brand-muted);
      padding: 24px;
    }

    /* Toggle de visualização (mobile) */
    .view-toggle {
      display: none;
    }
    @media (max-width: 760px) {
      .view-toggle {
        display: flex;
        gap: 4px;
        padding: 4px;
        border: var(--glass-border);
        border-radius: 999px;
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(10px);
        margin-bottom: 12px;
      }
      .view-toggle button {
        flex: 1;
        height: 34px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--brand-muted);
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
        transition: background .2s, color .2s;
      }
      .view-toggle button.is-active {
        background: rgba(255,255,255,0.85);
        color: var(--brand-primary);
        box-shadow: 0 1px 4px rgba(102,0,144,.10);
      }
      .map-card { display: none; }
      .map-card.is-visible { display: block; }
      .actor-list { display: none; }
      .actor-list.is-visible { display: grid; }
    }
    @media (min-width: 761px) {
      .map-card { display: block !important; }
      .actor-list { display: none !important; }
    }

    /* Lista de atores (mobile) */
    .actor-list {
      grid-gap: 8px;
      padding: 2px;
    }
    .actor-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: var(--glass-border);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      transition: background .15s;
    }
    .actor-list-item:hover, .actor-list-item:active {
      background: rgba(255,255,255,0.85);
    }
    .actor-list-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(102,0,144,0.10);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 14px;
      color: var(--brand-primary);
      flex-shrink: 0;
      overflow: hidden;
    }
    .actor-list-avatar img {

          return { actors, source: "Google Sheets sincronizado" };
        }

        const csv = await this.fetchCsv(this.config.csvUrl);
        const actors = this.parseCsv(csv);
        this.assertValidCategories(actors);
        return { actors, source: "Google Sheets sincronizado" };
      }

      assertValidCategories(actors) {
        if (!actors.length) return;
        const validCount = actors.filter((actor) => this.config.categories.includes(actor.categoria)).length;
        if (validCount === 0) {
          throw new Error("A planilha foi lida, mas a coluna categoria não foi reconhecida (cabeçalho pode ter vindo deslocado).");
        }
      }

      parseCsv(csv) {
        const rows = [];
        let field = "";
        let row = [];
        let quoted = false;

        for (let index = 0; index < csv.length; index += 1) {
          const char = csv[index];
          const next = csv[index + 1];

          if (char === '"' && quoted && next === '"') {
            field += '"';
            index += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            row.push(field);
            field = "";
          } else if ((char === "\n" || char === "\r") && !quoted) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(field);
            rows.push(row);
            row = [];
            field = "";
          } else {
            field += char;
          }
        }

        if (field || row.length) {
          row.push(field);
          rows.push(row);
        }

        const headers = rows.shift().map((header) => this.normalizeKey(header));

        return rows
          .filter((cells) => cells.some((cell) => String(cell).trim()))
          .map((cells) => headers.reduce((actor, key, index) => {
            actor[key] = (cells[index] || "").trim();
            return actor;
          }, {}))
          .map((actor) => this.normalizeActor(actor))
          .filter((actor) => this.normalizeText(actor.mostrar) !== "não")
          .map((actor) => ({ 
              ...actor, 
              participacoes: Number(actor.participacoes || actor.participações || actor["participacoes"] || 0),
              participações: Number(actor.participacoes || actor.participações || actor["participacoes"] || 0)
            }));
      }

      isGoogleSheetsUrl(url) {
        return /docs\.google\.com\/spreadsheets\/d\//i.test(url);
      }

      extractSpreadsheetInfo(url) {
        const gid = url.match(/[?&#]gid=([^&#]+)/i)?.[1] || "0";
        const publishedMatch = url.match(/\/spreadsheets\/d\/e\/([^/?#]+)/i);
        if (publishedMatch) {
          return { id: publishedMatch[1], gid, published: true };
        }

        const normalMatch = url.match(/\/spreadsheets\/d\/([^/?#]+)/i);
        if (normalMatch) {
          return { id: normalMatch[1], gid, published: false };
        }

        return null;
      }

      async loadGoogleSheet(url) {
        const info = this.extractSpreadsheetInfo(url);
        if (!info) {
          throw new Error("Link do Google Sheets invalido.");
        }

        if (info.published) {
          const csv = await this.fetchCsv(url);
          const actors = this.parseCsv(csv);
          if (actors.length) return actors;
          throw new Error("A planilha publicada foi lida, mas nenhum ator valido foi encontrado.");
        }

        try {
          const actors = await this.loadGoogleSheetJsonp(info);
          if (actors.length) return actors;
          throw new Error("A planilha foi lida, mas nenhum ator valido foi encontrado.");
        } catch (jsonpError) {
          try {
            const csvUrl = `https://docs.google.com/spreadsheets/d/${info.id}/gviz/tq?tqx=out:csv&gid=${encodeURIComponent(info.gid)}&headers=1`;
            const csv = await this.fetchCsv(csvUrl);
            const actors = this.parseCsv(csv);
            if (actors.length) return actors;
            throw new Error("A planilha foi lida, mas nenhum ator valido foi encontrado.");
          } catch (csvError) {
            throw new Error(`Não foi possível carregar a planilha. Verifique se o compartilhamento esta como "Qualquer pessoa com o link: Leitor". Detalhe: ${jsonpError.message}`);
          }
        }
      }

      async fetchCsv(url) {
        const separator = url.includes("?") ? "&" : "?";
        const response = await fetch(`${url}${separator}_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();
        if (/<!doctype html|<html/i.test(text)) {
          throw new Error("o link retornou HTML, não CSV");
        }

        return text;
      }

      loadGoogleSheetJsonp(info) {
        return new Promise((resolve, reject) => {
          const source = `https://docs.google.com/spreadsheets/d/${info.id}/gviz/tq?gid=${encodeURIComponent(info.gid)}&headers=1`;
          const callbackName = `__indaialSheet_${Date.now()}_${Math.round(Math.random() * 100000)}`;
          const script = document.createElement("script");
          const timeout = window.setTimeout(() => {
            cleanup();
            reject(new Error("A planilha demorou para responder. Verifique se ela esta publicada na Web."));
          }, 12000);

          const cleanup = () => {
            window.clearTimeout(timeout);
            delete window[callbackName];
            script.remove();
          };

          window[callbackName] = (payload) => {
            cleanup();
            if (!payload || payload.status === "error") {
              reject(new Error("Não foi possível ler a planilha publicada."));
              return;
            }

            resolve(this.parseGoogleVisualization(payload));
          };

          script.onerror = () => {
            cleanup();
            reject(new Error("Não foi possível conectar ao Google Sheets."));
          };

          script.src = `${source}&tqx=out:json;responseHandler:${callbackName}`;
          document.head.appendChild(script);
        });
      }

      parseGoogleVisualization(payload) {
        const table = payload.table || {};
        const headers = (table.cols || []).map((column, index) => this.normalizeKey(column.label || column.id || `col_${index}`));

        return (table.rows || [])
          .map((row) => headers.reduce((actor, key, index) => {
            const cell = row.c?.[index];
            actor[key] = cell ? String(cell.f ?? cell.v ?? "").trim() : "";
            return actor;
          }, {}))
          .filter((actor) => Object.values(actor).some((value) => String(value).trim()))
          .map((actor) => this.normalizeActor(actor))
          .filter((actor) => this.normalizeText(actor.mostrar) !== "não")
          .map((actor) => ({ 
              ...actor, 
              participacoes: Number(actor.participacoes || actor.participações || actor["participacoes"] || 0),
              participações: Number(actor.participacoes || actor.participações || actor["participacoes"] || 0)
            }));
      }

      normalizeActor(actor) {
        const normalized = { ...actor };
        const category = this.normalizeText(normalized.categoria || normalized["categoria"]).replace(/\s+/g, "_");
        const level = this.normalizeText(normalized.nivel || normalized.nível || normalized["nivel"]).replace(/\s+/g, "_");

        const categoryAliases = {
          empresas: "Empresas",
          ctis: "CTIs",
          sociedade_organizada: "Sociedade Organizada",
          governo: "Governo",
          mecanismos_de_inovacao: "Mecanismos de Inovação"
        };

        const levelAliases = {
          "31+": "31+",
          "21+": "21+",
          "11+": "11+",
          "5+": "5+",
          ate_5: "Ate 5",
          "ate 5": "Ate 5",
          "ate5": "Ate 5"
        };

        normalized.categoria = categoryAliases[category] || normalized.categoria;
        normalized.nivel = levelAliases[level] || normalized.nivel || normalized.nível;
        normalized.nível = normalized.nivel;
        normalized.id = normalized.id || this.normalizeText(normalized.nome).replace(/\s+/g, "-");
        normalized.mostrar = normalized.mostrar || "SIM";
        return normalized;
      }

      normalizeKey(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, "_");
      }

      normalizeText(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }
    }

    class EcosystemMap {
      constructor() {
        this.csvService = new CsvService(CONFIG);
        this.actors = [];
        this.filteredActors = [];
        this.positions = new Map();
        this.selectedId = null;
        this.highlightId = null;
        this.view = { x: 0, y: 0, scale: 1 };
        this.drag = null;

        this.elements = {
          svg: document.getElementById("radarSvg"),
          search: document.getElementById("searchInput"),
          category: document.getElementById("categoryFilter"),
          city: document.getElementById("cityFilter"),
          level: document.getElementById("levelFilter"),
          stats: document.getElementById("statsGrid"),
          legend: document.getElementById("legend"),
          panel: document.getElementById("panelBody"),
          tooltip: document.getElementById("tooltip"),
          toast: document.getElementById("toast"),
          sync: document.getElementById("syncStatus"),
          actorList: document.getElementById("actorList"),
          mapCard: document.querySelector(".map-card"),
        };
        this.currentView = "radar";
      }

      async init() {
        this.bindEvents();
        this.populateStaticFilters();
        await this.refreshData();
        this.renderEmptyPanel();
        this.renderIcons();
        // inicializar toggle
        if (this.elements.mapCard) this.elements.mapCard.classList.add("is-visible");
      }

      bindEvents() {
        document.getElementById("toolbar").addEventListener("submit", (event) => event.preventDefault());
        const helpBtn = document.getElementById("radarHelpBtn");
        const popover = document.getElementById("radarPopover");
        if (helpBtn && popover) {
          helpBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            popover.classList.toggle("is-open");
          });
          document.addEventListener("click", () => popover.classList.remove("is-open"));
        }
        this.elements.search.addEventListener("input", () => this.applyFilters({ centerMatch: true }));
        this.elements.category.addEventListener("change", () => this.applyFilters());
        this.elements.city.addEventListener("change", () => this.applyFilters());
        this.elements.level.addEventListener("change", () => this.applyFilters());
        document.getElementById("refreshButton").addEventListener("click", () => this.refreshData());
        document.getElementById("centerButton").addEventListener("click", () => this.centerView());
        document.getElementById("exportSvgButton").addEventListener("click", () => this.exportSvg());
        document.getElementById("exportPngButton").addEventListener("click", () => this.exportPng());
        document.getElementById("closePanelButton").addEventListener("click", () => this.clearSelection());

        // Toggle Lista/Radar (mobile)
        const btnRadar = document.getElementById("btnViewRadar");
        const btnList = document.getElementById("btnViewList");
        if (btnRadar && btnList) {
          btnRadar.addEventListener("click", () => this.switchView("radar"));
          btnList.addEventListener("click", () => this.switchView("list"));
        }

        this.elements.svg.addEventListener("wheel", (event) => this.handleWheel(event), { passive: false });
        this.elements.svg.addEventListener("pointerdown", (event) => this.startPan(event));
        window.addEventListener("pointermove", (event) => this.movePan(event));
        window.addEventListener("pointerup", () => this.endPan());
      }

      async refreshData() {
        this.setSyncStatus("Atualizando dados...");
        try {
          const payload = await this.csvService.loadActors();
          this.actors = payload.actors.filter((actor) => this.normalize(actor.mostrar) !== "não");
          this.setSyncStatus(`${payload.source} - ${this.formatDateTime(new Date())}`);
          this.populateDynamicFilters();
          this.applyFilters();
          this.showToast("Dados atualizados com sucesso.");
        } catch (error) {
          this.actors = FAKE_ACTORS;
          this.setSyncStatus(`Falha na planilha: ${error.message}. Base fictícia em uso - ${this.formatDateTime(new Date())}`);
          this.populateDynamicFilters();
          this.applyFilters();
          this.showToast(error.message);
        }
      }

      populateStaticFilters() {
        this.fillSelect(this.elements.category, ["Categoria", ...CONFIG.categories]);
        this.fillSelect(this.elements.level, ["Nível", ...CONFIG.levelMap.map((level) => level.label)]);
      }

      populateDynamicFilters() {
        const cities = [...new Set(this.actors.map((actor) => actor.município).filter(Boolean))].sort((a, b) => a.localeCompare(b));
        this.fillSelect(this.elements.city, ["Município", ...cities]);
      }

      fillSelect(select, values) {
        const current = select.value;
        select.innerHTML = values.map((value, index) => `<option value="${index === 0 ? "" : this.escape(value)}">${this.escape(value)}</option>`).join("");
        if ([...select.options].some((option) => option.value === current)) {
          select.value = current;
        }
      }

      applyFilters(options = {}) {
        const query = this.normalize(this.elements.search.value);
        const category = this.elements.category.value;
        const city = this.elements.city.value;
        const level = this.elements.level.value;

        this.filteredActors = this.actors.filter((actor) => {
          const haystack = this.normalize(`${actor.nome} ${actor.município} ${actor.representante} ${actor.categoria}`);
          return (!query || haystack.includes(query)) &&
            (!category || actor.categoria === category) &&
            (!city || actor.município === city) &&
            (!level || actor.nível === level || actor.nivel === level);
        });

        this.calculatePositions();
        this.renderStats();
        this.renderLegend();
        this.renderMap();

        if (options.centerMatch && this.filteredActors.length === 1) {
          this.selectActor(this.filteredActors[0].id, { center: true });
        } else if (this.selectedId && !this.filteredActors.some((actor) => actor.id === this.selectedId)) {
          this.clearSelection({ keepPanel: false });
        }
      }

      calculatePositions() {
        this.positions.clear();
        const occupied = [];
        const groups = new Map();

        this.filteredActors.forEach((actor) => {
          const categoryIndex = Math.max(0, CONFIG.categories.indexOf(actor.categoria));
          const level = CONFIG.levelMap.find((item) => item.label === (actor.nível || actor.nivel)) || CONFIG.levelMap.at(-1);
          const key = `${categoryIndex}-${level.ring}`;
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push({ actor, categoryIndex, level });
        });

        groups.forEach((group) => {
          group.sort((a, b) => String(a.actor.nome).localeCompare(b.actor.nome));
          group.forEach((item, index) => {
            const position = this.findOpenPosition(item, index, group.length, occupied);
            this.positions.set(item.actor.id, position);
            occupied.push(position);
          });
        });
      }

      findOpenPosition(item, index, total, occupied) {
        const segmentAngle = 360 / CONFIG.categories.length;
        const start = -90 + item.categoryIndex * segmentAngle;
        const centerAngle = start + segmentAngle / 2;
        const spread = Math.min(segmentAngle * .66, 18 + total * 5);
        const baseOffset = total === 1 ? 0 : ((index / (total - 1)) - .5) * spread;
        const baseRadius = item.level.radius;

        for (let attempt = 0; attempt < 60; attempt += 1) {
          const radialOffset = (attempt % 6) * 9 * (attempt % 2 ? 1 : -1);
          const angularOffset = baseOffset + Math.floor(attempt / 6) * 3.7 * (attempt % 2 ? 1 : -1);
          const point = this.polarToPoint(baseRadius + radialOffset, centerAngle + angularOffset);
          if (this.hasEnoughSpace(point, occupied)) {
            return { ...point, angle: centerAngle + angularOffset, radius: baseRadius + radialOffset };
          }
        }

        return this.polarToPoint(baseRadius, centerAngle + baseOffset);
      }

      hasEnoughSpace(point, occupied) {
        return occupied.every((other) => {
          const distance = Math.hypot(point.x - other.x, point.y - other.y);
          return distance >= CONFIG.minimumDistance;
        });
      }

      polarToPoint(radius, angle) {
        const radians = angle * Math.PI / 180;
        return {
          x: CONFIG.center + Math.cos(radians) * radius,
          y: CONFIG.center + Math.sin(radians) * radius
        };
      }

      renderStats() {
        const counts = CONFIG.categories.map((category) => ({
          label: category,
          value: this.filteredActors.filter((actor) => actor.categoria === category).length,
          color: CONFIG.colors[category] || "var(--brand-primary)"
        }));

        const total = { label: "Total de atores", value: this.filteredActors.length, color: null };
        const stats = [total, ...counts];

        this.elements.stats.innerHTML = stats.map((stat) => `
          <div class="stat-card">
            <p class="stat-label">
              ${stat.color ? `<span class="stat-dot" style="background:${stat.color}"></span>` : ""}
              ${this.escape(stat.label)}
            </p>
            <p class="stat-value${stat.value === 0 ? " is-zero" : ""}">
              ${stat.value}
            </p>
          </div>
        `).join("");
      }

      renderLegend() {
        this.elements.legend.innerHTML = CONFIG.categories.map((category) => `
          <span class="legend-item">
            <span class="legend-swatch" style="--swatch:${CONFIG.colors[category]}"></span>
            ${this.escape(category)}
          </span>
        `).join("");
      }

      renderMap() {
        const svg = this.elements.svg;
        svg.setAttribute("viewBox", `0 0 ${CONFIG.svgSize} ${CONFIG.svgSize}`);
        svg.innerHTML = `
          <defs>
            <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="${CONFIG.colors.Empresas}"></stop>
              <stop offset="50%" stop-color="${CONFIG.colors.CTIs}"></stop>
              <stop offset="100%" stop-color="${CONFIG.colors["Mecanismos de Inovação"]}"></stop>
            </linearGradient>
          </defs>
          <g id="viewportGroup" transform="${this.viewportTransform()}">
            ${this.renderRadarStructure()}
            ${this.renderActors()}
          </g>
        `;
        this.bindNodeEvents();
        this.updateNodeState();
      }

      renderRadarStructure() {
        const rings = CONFIG.levelMap.map((level) => {
          const midRadius = level.radius + CONFIG.ringGap / 2;
          return `<circle class="ring-fill" cx="${CONFIG.center}" cy="${CONFIG.center}" r="${midRadius}"></circle>`;
        }).join("");

        const ringLines = CONFIG.levelMap.map((level) => `
          <circle class="ring-line" cx="${CONFIG.center}" cy="${CONFIG.center}" r="${level.radius}"></circle>
          <text class="level-label" x="${CONFIG.center + 10}" y="${CONFIG.center - level.radius + 18}">${level.label}</text>
        `).join("");

        const segmentAngle = 360 / CONFIG.categories.length;
        const segmentLines = CONFIG.categories.map((category, index) => {
          const angle = -90 + index * segmentAngle;
          const end = this.polarToPoint(465, angle);
          const labelPoint = this.polarToPoint(505, angle + segmentAngle / 2);
          return `
            <line class="segment-line" x1="${CONFIG.center}" y1="${CONFIG.center}" x2="${end.x}" y2="${end.y}"></line>
            <text class="segment-label" x="${labelPoint.x}" y="${labelPoint.y}" text-anchor="middle">${this.escape(category)}</text>
          `;
        }).join("");

        return `
          <g aria-hidden="true">
            ${rings}
            ${ringLines}
            ${segmentLines}
          </g>
          <g class="center-node" transform="translate(${CONFIG.center} ${CONFIG.center})">
            <circle r="58"></circle>
            <text y="-5" font-size="15">${CONFIG.centerLabel.split(" ")[0]}</text>
            <text y="16" font-size="15">${CONFIG.centerLabel.split(" ").slice(1).join(" ")}</text>
          </g>
        `;
      }

      renderActors() {
        return this.filteredActors.map((actor) => {
          const position = this.positions.get(actor.id);
          const half = CONFIG.nodeSize / 2;
          const candidates = this.resolveLogoCandidates(actor.logo);
          const imagePath = candidates[0] || "";
          const initials = this.initials(actor.nome);
          return `
            <g class="actor-node" data-id="${this.escape(actor.id)}" role="button" aria-label="${this.escape(actor.nome)}" transform="translate(${position.x} ${position.y})">
              <circle class="node-hit" r="34"></circle>
              <rect class="logo-box" x="${-half}" y="${-half}" width="${CONFIG.nodeSize}" height="${CONFIG.nodeSize}" rx="10"></rect>
              <text class="logo-initials" x="0" y="1">${initials}</text>
              ${imagePath ? `<image class="actor-image" href="${this.escape(imagePath)}" data-fallback="${this.escape(candidates.slice(1).join("|"))}" x="${-half}" y="${-half}" width="${CONFIG.nodeSize}" height="${CONFIG.nodeSize}" preserveAspectRatio="xMidYMid slice"></image>` : ""}
            </g>
          `;
        }).join("");
      }

      bindNodeEvents() {
        this.elements.svg.querySelectorAll(".actor-node").forEach((node) => {
          const id = node.dataset.id;
          node.addEventListener("mouseenter", (event) => this.showTooltip(event, id));
          node.addEventListener("mousemove", (event) => this.moveTooltip(event));
          node.addEventListener("mouseleave", () => this.hideTooltip());
          node.addEventListener("click", (event) => {
            event.stopPropagation();
            this.selectActor(id, { center: true });
          });
        });

        this.elements.svg.querySelectorAll(".actor-image").forEach((image) => {
          image.addEventListener("error", () => {
            const fallback = image.dataset.fallback;
            if (fallback) {
              const [next, ...rest] = fallback.split("|");
              image.dataset.fallback = rest.join("|");
              image.setAttribute("href", next);
            } else {
              image.remove();
            }
          });
        });
      }

      updateNodeState() {
        const query = this.normalize(this.elements.search.value);
        this.elements.svg.querySelectorAll(".actor-node").forEach((node) => {
          const actor = this.findActor(node.dataset.id);
          const matchesQuery = !query || this.normalize(`${actor.nome} ${actor.município} ${actor.representante}`).includes(query);
          node.classList.toggle("is-selected", actor.id === this.selectedId);
          node.classList.toggle("is-highlight", matchesQuery && Boolean(query));
          node.classList.toggle("is-muted", Boolean(query) && !matchesQuery);
        });
      }

      selectActor(id, options = {}) {
        this.selectedId = id;
        const actor = this.findActor(id);
        if (!actor) return;

        this.renderPanel(actor);
        this.updateNodeState();

        if (options.center) {
          this.centerOnActor(id);
        }
      }

      centerOnActor(id) {
        const position = this.positions.get(id);
        if (!position) return;
        const targetScale = Math.max(this.view.scale, 1.18);
        this.view = {
          scale: targetScale,
          x: CONFIG.center - position.x * targetScale,
          y: CONFIG.center - position.y * targetScale
        };
        this.applyViewport();
      }

      clearSelection(options = {}) {
        this.selectedId = null;
        this.updateNodeState();
        if (!options.keepPanel) this.renderEmptyPanel();
      }

      renderPanel(actor) {
        const logoCandidates = this.resolveLogoCandidates(actor.logo);
        const logoPath = logoCandidates[0] || "";

        const contactDetails = [
          ["building-2", "Município", actor.municipio],
          ["user-round", "Representante", actor.representante],
          ["phone", "Telefone", actor.telefone],
          ["mail", "E-mail", actor.email ? `<a href="mailto:${this.escape(actor.email)}">${this.escape(actor.email)}</a>` : ""],
          ["globe", "Site", actor.site ? `<a href="${this.escape(actor.site)}" target="_blank" rel="noreferrer">${this.escape(actor.site)}</a>` : ""],
        ];

        const activityDetails = [
          ["activity", "Participações", actor.participacoes],
          ["calendar-days", "Última interação", this.formatDate(actor.ultima_interacao)],
          ["badge-check", "Prioridade", actor.prioridade],
        ];

        const renderDetailGroup = (items) => items
          .filter((d) => d[2])
          .map(([icon, label, value]) => `
            <div class="detail">
              <i data-lucide="${icon}"></i>
              <div>
                <p class="detail-label">${label}</p>
                <p class="detail-value">${value}</p>
              </div>
            </div>
          `).join("");

        const statusColor = actor.status === "Ativo" ? "#16a34a" : actor.status === "Prospeccao" ? "#d97706" : "var(--brand-muted)";

        this.elements.panel.innerHTML = `
          <div class="actor-profile">
            <div class="profile-logo">
              ${logoPath ? `<img src="${this.escape(logoPath)}" data-fallback="${this.escape(logoCandidates.slice(1).join("|"))}" alt="">` : ""}
              <span>${this.initials(actor.nome)}</span>
            </div>
            <div>
              <p class="profile-kicker">${this.escape(actor.categoria)}</p>
              <h2 class="profile-name">${this.escape(actor.nome)}</h2>
            </div>
            <div class="pill-row">
              <span class="pill"><i data-lucide="radar"></i>${this.escape(actor.nivel)}</span>
              <span class="pill" style="color:${statusColor}">
                <i data-lucide="circle-check-big"></i>${this.escape(actor.status || "—")}
              </span>
            </div>
            ${contactDetails.some(d => d[2]) ? `
              <p class="section-label">Contato</p>
              <div class="detail-list">${renderDetailGroup(contactDetails)}</div>
            ` : ""}
            ${activityDetails.some(d => d[2]) ? `
              <p class="section-label">Atividade</p>
              <div class="detail-list">${renderDetailGroup(activityDetails)}</div>
            ` : ""}
            ${actor.observacoes ? `
              <p class="section-label">Observações</p>
              <div class="detail-list">
                <div class="detail">
                  <i data-lucide="message-square-text"></i>
                  <div><p class="detail-value">${this.escape(actor.observacoes)}</p></div>
                </div>
              </div>
            ` : ""}
          </div>
        `;

        const image = this.elements.panel.querySelector(".profile-logo img");
        const fallback = this.elements.panel.querySelector(".profile-logo span");
        if (image) {
          image.addEventListener("load", () => {
            image.style.display = "block";
            fallback.style.display = "none";
          });
          image.addEventListener("error", () => {
            const nextCandidates = image.dataset.fallback;
            if (nextCandidates) {
              const [next, ...rest] = nextCandidates.split("|");
              image.dataset.fallback = rest.join("|");
              image.setAttribute("src", next);
            } else {
              image.remove();
              fallback.style.display = "block";
            }
          });
        }
        this.renderIcons();
      }

            renderEmptyPanel() {
        this.elements.panel.innerHTML = `
          <div class="empty-state">
            <div class="empty-card">
              <div class="empty-icon"><i data-lucide="mouse-pointer-click"></i></div>
              <strong>Selecione um ator</strong>
              <span>Clique em uma logo no radar para ver contatos, status, participações e observações.</span>
            </div>
          </div>
        `;
        this.renderIcons();
      }

      showTooltip(event, id) {
        const actor = this.findActor(id);
        if (!actor) return;
        const color = CONFIG.colors[actor.categoria] || "var(--brand-primary)";
        const statusColor = actor.status === "Ativo" ? "#16a34a" : "var(--brand-muted)";
        this.elements.tooltip.innerHTML = `
          <strong style="font-size:14px;display:block;margin-bottom:5px">${this.escape(actor.nome)}</strong>
          <span style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>
            ${this.escape(actor.categoria)}
          </span>
          <span style="display:flex;align-items:center;gap:10px;color:var(--brand-muted);font-size:12px">
            <span>${this.escape(String(actor.participacoes))} participações</span>
            <span style="color:${statusColor}">${this.escape(actor.status || "")}</span>
          </span>
        `;
        this.elements.tooltip.classList.add("is-visible");
        this.moveTooltip(event);
      }

      moveTooltip(event) {
        this.elements.tooltip.style.left = `${Math.min(event.clientX + 18, window.innerWidth - 280)}px`;
        this.elements.tooltip.style.top = `${Math.max(14, event.clientY - 8)}px`;
      }

      hideTooltip() {
        this.elements.tooltip.classList.remove("is-visible");
      }

      handleWheel(event) {
        event.preventDefault();
        const direction = event.deltaY > 0 ? -1 : 1;
        const factor = 1 + direction * .08;
        const nextScale = Math.min(2.4, Math.max(.62, this.view.scale * factor));
        const point = this.screenToSvg(event.clientX, event.clientY);
        this.view.x = point.x - (point.x - this.view.x) * (nextScale / this.view.scale);
        this.view.y = point.y - (point.y - this.view.y) * (nextScale / this.view.scale);
        this.view.scale = nextScale;
        this.applyViewport();
      }

      startPan(event) {
        if (event.target.closest(".actor-node")) return;
        this.drag = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          viewX: this.view.x,
          viewY: this.view.y
        };
        this.elements.svg.setPointerCapture(event.pointerId);
      }

      movePan(event) {
        if (!this.drag) return;
        const scaleFactor = CONFIG.svgSize / this.elements.svg.getBoundingClientRect().width;
        this.view.x = this.drag.viewX + (event.clientX - this.drag.startX) * scaleFactor;
        this.view.y = this.drag.viewY + (event.clientY - this.drag.startY) * scaleFactor;
        this.applyViewport();
      }

      endPan() {
        this.drag = null;
      }

      centerView() {
        this.view = { x: 0, y: 0, scale: 1 };
        this.applyViewport();
      }

      applyViewport() {
        const group = this.elements.svg.querySelector("#viewportGroup");
        if (group) group.setAttribute("transform", this.viewportTransform());
      }

      viewportTransform() {
        return `translate(${this.view.x} ${this.view.y}) scale(${this.view.scale})`;
      }

      screenToSvg(clientX, clientY) {
        const rect = this.elements.svg.getBoundingClientRect();
        const scale = CONFIG.svgSize / rect.width;
        return {
          x: (clientX - rect.left) * scale,
          y: (clientY - rect.top) * scale
        };
      }

      exportSvg() {
        const clone = this.elements.svg.cloneNode(true);
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        const blob = new Blob([clone.outerHTML], { type: "image/svg+xml;charset=utf-8" });
        this.downloadBlob(blob, "mapa-atores-ecossistema.svg");
      }

      async exportPng() {
        const clone = this.elements.svg.cloneNode(true);
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        const svgBlob = new Blob([clone.outerHTML], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(svgBlob);
        const image = new Image();
        image.crossOrigin = "anonymous";
        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = 1800;
          canvas.height = 1800;
          const context = canvas.getContext("2d");
          context.fillStyle = "#FAFAFC";
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob((blob) => this.downloadBlob(blob, "mapa-atores-ecossistema.png"), "image/png", .95);
        };
        image.onerror = () => this.showToast("Não foi possível exportar PNG neste navegador.");
        image.src = url;
      }

      downloadBlob(blob, filename) {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      switchView(view) {
        this.currentView = view;
        const btnRadar = document.getElementById("btnViewRadar");
        const btnList = document.getElementById("btnViewList");
        if (btnRadar) btnRadar.classList.toggle("is-active", view === "radar");
        if (btnList) btnList.classList.toggle("is-active", view === "list");
        if (this.elements.mapCard) this.elements.mapCard.classList.toggle("is-visible", view === "radar");
        if (this.elements.actorList) this.elements.actorList.classList.toggle("is-visible", view === "list");
        if (view === "list") this.renderActorList();
      }

      renderActorList() {
        if (!this.elements.actorList) return;
        if (!this.filteredActors.length) {
          this.elements.actorList.innerHTML = `<p style="padding:24px;text-align:center;color:var(--brand-muted)">Nenhum ator encontrado.</p>`;
          return;
        }
        this.elements.actorList.innerHTML = this.filteredActors.map((actor) => {
          const candidates = this.resolveLogoCandidates(actor.logo);
          const img = candidates[0] ? `<img src="${this.escape(candidates[0])}" alt="" style="display:none">` : "";
          const color = CONFIG.colors[actor.categoria] || "var(--brand-primary)";
          return `
            <div class="actor-list-item" data-id="${this.escape(actor.id)}" role="button" tabindex="0">
              <div class="actor-list-avatar">
                ${img}
                <span>${this.initials(actor.nome)}</span>
              </div>
              <div style="min-width:0;flex:1">
                <p class="actor-list-name">${this.escape(actor.nome)}</p>
                <p class="actor-list-meta">${this.escape(actor.categoria)} · ${this.escape(actor.nivel)}</p>
              </div>
              <span class="actor-list-cat" style="background:${color}"></span>
            </div>
          `;
        }).join("");
        // eventos de clique na lista
        this.elements.actorList.querySelectorAll(".actor-list-item").forEach((item) => {
          item.addEventListener("click", () => {
            this.selectActor(item.dataset.id);
            // em mobile rolar até o painel
            document.querySelector(".side-panel")?.scrollIntoView({ behavior: "smooth", block: "start" });
          });
          // carregar logo
          const img = item.querySelector("img");
          if (img) {
            img.addEventListener("load", () => { img.style.display = "block"; item.querySelector("span")?.remove(); });
            img.addEventListener("error", () => img.remove());
          }
        });
        this.renderIcons();
      }

      findActor(id) {
        return this.actors.find((actor) => actor.id === id);
      }

      normalize(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      initials(name) {
        return String(name || "")
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0])
          .join("")
          .toUpperCase();
      }

      resolveLogoPath(logo) {
        return this.resolveLogoCandidates(logo)[0] || "";
      }

      resolveLogoCandidates(logo) {
        const value = String(logo || "").trim();
        if (!value) return [];

        const driveId = this.extractDriveId(value);
        if (driveId) {
          return [
            `https://drive.google.com/thumbnail?id=${driveId}&sz=w160`,
            `https://lh3.googleusercontent.com/d/${driveId}=w160`
          ];
        }

        if (/^https?:\/\//i.test(value)) {
          return [value];
        }

        return [`${CONFIG.logoBasePath}${value}`];
      }

      extractDriveId(value) {
        const patterns = [
          /drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/,
          /drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/,
          /drive\.google\.com\/uc\?id=([a-zA-Z0-9_-]+)/,
          /^[a-zA-Z0-9_-]{25,}$/
        ];

        for (const pattern of patterns) {
          const match = value.match(pattern);
          if (match) return match[1] || match[0];
        }

        return "";
      }

      escape(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      formatDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("pt-BR", { dateStyle: "medium" }).format(date);
      }

      formatDateTime(date) {
        return new Intl.DateTimeFormat("pt-BR", { dateStyle: "short", timeStyle: "short" }).format(date);
      }

      setSyncStatus(message) {
        this.elements.sync.textContent = message;
      }

      showToast(message) {
        this.elements.toast.textContent = message;
        this.elements.toast.classList.add("is-visible");
        clearTimeout(this.toastTimer);
        this.toastTimer = setTimeout(() => this.elements.toast.classList.remove("is-visible"), 2600);
      }

      renderIcons() {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const app = new EcosystemMap();
      window.ecosystemMap = app;
      app.init().catch((error) => {
        app.setSyncStatus(`Erro ao iniciar: ${error.message}`);
        app.showToast(error.message);
      });
    });
  </script>
</body>
</html>
